<!DOCTYPE html>
<html>
<head>
    <title>Page Content</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ccc;
        }

        section {
            margin-left: 20px;
        }

        h1 {
            font-size: 28px;
        }

        header > p {
            font-style: italic;
        }

        article > p {
            font-size: 24px;
        }
    </style>

</head>
<body>

<header>
    <h1>Welcome</h1>
    <p>This is the header paragraph</p>
</header>

<section>
    <article>
        <p>This is article content</p>
    </article>
</section>

</body>
</html>
